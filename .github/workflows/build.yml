name: Fast Build Ghost Kazakh
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Android SDK Framework
        run: |
          # Apktool-ға қажетті жүйелік framework-ті қолдан жүктеп, орнату
          mkdir -p ~/.local/share/apktool/framework
          wget https://github.com/iBotPeaches/Apktool/raw/master/brut.apktool/src/test/resources/framework/1.apk -O ~/.local/share/apktool/framework/1.apk

      - name: Build and Sign APK
        run: |
          wget https://github.com/iBotPeaches/Apktool/releases/download/v2.9.3/apktool_2.9.3.jar -O apktool.jar
          
          # Framework-ті ескермей, AAPT2 арқылы жинау
          java -jar apktool.jar b app --use-aapt2 -o Ghost_unaligned.apk
          
          sudo apt-get update && sudo apt-get install apksigner zipalign -y
          zipalign -p -f 4 Ghost_unaligned.apk Ghost_aligned.apk
          
          keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
          apksigner sign --ks debug.keystore --ks-pass pass:android --key-pass pass:android --out Ghost_Elite_Signed.apk Ghost_aligned.apk
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Ghost-Elite-Build
          path: Ghost_Elite_Signed.apk
