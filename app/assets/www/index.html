<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>GHOST KAZAKH v3.0 ELITE</title>
    <style>
        :root {
            --kz-green: #00ff41;
            --kz-gold: #ffff00;
            --glass: rgba(0, 10, 0, 0.9);
            --glow-green: 0 0 15px rgba(0, 255, 65, 0.6);
            --glow-gold: 0 0 8px rgba(255, 255, 0, 0.5);
        }
        body { margin: 0; padding: 0; font-family: 'Courier New', monospace; background: #000; height: 100vh; overflow: hidden; display: flex; justify-content: center; align-items: center; color: #eee; }
        body::before { content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(rgba(0, 255, 65, 0.1) 1px, transparent 1px), linear-gradient(90deg, rgba(0, 255, 65, 0.1) 1px, transparent 1px); background-size: 20px 20px; animation: matrixScroll 20s linear infinite; z-index: -1; }
        @keyframes matrixScroll { to { background-position: 0 400px; } }
        .mod-menu { width: 340px; background: var(--glass); backdrop-filter: blur(5px); border: 2px solid var(--kz-gold); border-radius: 10px; box-shadow: var(--glow-green), var(--glow-gold); position: absolute; z-index: 9999; user-select: none; overflow: hidden; animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
        .header { background: linear-gradient(90deg, #001000, #003000, #001000); padding: 10px; text-align: center; cursor: move; border-bottom: 2px solid var(--kz-gold); }
        .header h1 { margin: 0; font-size: 16px; letter-spacing: 3px; color: var(--kz-gold); text-transform: uppercase; }
        .content { padding: 15px; max-height: 400px; overflow-y: auto; }
        .feature { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; background: rgba(0, 255, 65, 0.03); padding: 10px; border-radius: 5px; border: 1px solid rgba(0, 255, 65, 0.1); }
        .feature span { color: var(--kz-green); font-size: 13px; font-weight: bold; }
        .switch { position: relative; display: inline-block; width: 36px; height: 18px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #111; transition: .3s; border-radius: 18px; border: 1px solid rgba(0, 255, 65, 0.3); }
        .slider:before { position: absolute; content: ""; height: 12px; width: 12px; left: 2px; bottom: 2px; background-color: #555; transition: .3s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--kz-green); }
        input:checked + .slider:before { transform: translateX(18px); background-color: var(--kz-gold); }
        .status-container { display: flex; justify-content: space-between; padding: 8px 15px; font-size: 11px; color: var(--kz-green); background: rgba(0, 255, 65, 0.05); border-top: 1px solid rgba(0, 255, 65, 0.3); }
        .footer { color: var(--kz-gold); font-size: 9px; text-align: center; padding: 8px; text-transform: uppercase; }
    </style>
</head>
<body>
<div class="mod-menu" id="menu">
    <div class="header" id="menuHeader"><h1>GHOST KAZAKH v3.0 ELITE</h1></div>
    <div class="content">
        <div class="feature"><span>AIMBOT // Цель</span><label class="switch"><input type="checkbox"><span class="slider"></span></label></div>
        <div class="feature"><span>ESP // Зрение</span><label class="switch"><input type="checkbox"><span class="slider"></span></label></div>
    </div>
    <div class="status-container">
        <span id="timeDisplay">⏱ 00:00:00</span>
        <span id="batteryDisplay">🔋 --%</span>
        <span id="netDisplay">📶 -- ms</span>
    </div>
    <div class="footer">Developer: ALMAS | GHOST TEAM</div>
</div>
<script>
    const menu = document.getElementById("menu");
    const header = document.getElementById("menuHeader");
    let isDragging = false;
    let offsetX, offsetY;

    const startDrag = (e) => {
        isDragging = true;
        let clientX = e.type.includes('touch') ? e.touches[0].clientX : e.clientX;
        let clientY = e.type.includes('touch') ? e.touches[0].clientY : e.clientY;
        offsetX = clientX - menu.offsetLeft;
        offsetY = clientY - menu.offsetTop;
    };
    const moveDrag = (e) => {
        if (!isDragging) return;
        let clientX = e.type.includes('touch') ? e.touches[0].clientX : e.clientX;
        let clientY = e.type.includes('touch') ? e.touches[0].clientY : e.clientY;
        menu.style.left = (clientX - offsetX) + "px";
        menu.style.top = (clientY - offsetY) + "px";
    };
    const endDrag = () => isDragging = false;

    header.addEventListener("mousedown", startDrag);
    document.addEventListener("mousemove", moveDrag);
    document.addEventListener("mouseup", endDrag);
    header.addEventListener("touchstart", startDrag);
    document.addEventListener("touchmove", moveDrag);
    document.addEventListener("touchend", endDrag);

    function updateTime() { document.getElementById('timeDisplay').innerHTML = "⏱ " + new Date().toLocaleTimeString('kk-KZ', { hour12: false }); }
    setInterval(updateTime, 1000);
    if ('getBattery' in navigator) { navigator.getBattery().then(b => { 
        const upd = () => document.getElementById('batteryDisplay').innerHTML = (b.charging ? "⚡ " : "🔋 ") + Math.round(b.level * 100) + "%";
        upd(); b.addEventListener('levelchange', upd); b.addEventListener('chargingchange', upd);
    }); }
    setInterval(() => { document.getElementById('netDisplay').innerHTML = "📶 " + (Math.floor(Math.random() * 25) + 20) + " ms"; }, 2000);
</script>
</body>
</html>
